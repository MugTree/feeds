version: "2"
sql:
  - engine: "sqlite"
    queries: "./app/db/queries/queries.sql"
    schema: "./app/db/migrations"
    gen:
      go:
        package: "db"
        out: "./app/db"
        overrides:
          - column: articles.published
            go_type:
              type: time.Time
              pointer: true
          - column: articles.date_found
            go_type:
              type: time.Time
              pointer: true
